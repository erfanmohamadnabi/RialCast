version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-me
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    command: >
      sh -c "pip install -r requirements.txt &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_SPIN_CONTRACT_ADDRESS=0x0000000000000000000000000000000000000000
      - REACT_APP_BET_CONTRACT_ADDRESS=0x0000000000000000000000000000000000000000
      - REACT_APP_NETWORK_ID=11155111
    command: npm start
    depends_on:
      - backend

volumes:
  backend_media:
